<body class="bg-light">

<nav class="navbar navbar-expand-md navbar-dark brand-color sticky-top shadow-sm py-3">
    <div class="container">
        <a class="navbar-brand fw-bold fs-3 brand-logo-text" href="#">Ofici<span>Ar</span></a>
        
        <div class="d-none d-md-flex align-items-center gap-4">
            <a href="#" class="text-white text-decoration-none fw-semibold link-hover"><i class="bi bi-calendar2-check me-2"></i>Turnos</a>
            <a href="#" class="text-white text-decoration-none fw-semibold link-hover"><i class="bi bi-wallet2 me-2"></i>Pagos</a>

            <div class="col-12 col-md-8 col-lg-6">

                    <i class="bi bi-search search-icon"></i>

                    <ul class="list-group suggestions-box border-0 shadow-lg" id="sugerencias"></ul>

        </div>
